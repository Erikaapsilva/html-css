<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelos de caixas</title>
    <style>
        h1{
            background-color: blanchedalmond;
            /* Box size*/
            height: 300px;
            width: 300px;


            border-width: 10px;
            border-style: solid;
            border-color: blueviolet;
            border-radius: 5px;
            /* border: 10px solid color */

            padding-top: 10px;
            padding-right: 10px;
            padding-bottom: 10px;
            padding-left: 10px;
            /* padding: 10px 10px 10px 10px 
            padding:10px */

        margin-top: 10px;
        margin-right: 10px;
        margin-bottom: 10px;
        margin-left: 10px;
        /* margin: 10px 10px 10px 10px */

        outline-width: 5px;
        outline-style: dashed;
        outline-color: blueviolet;
        }

        a{
            display: block;
            border-color: red;
            border-style: solid;
            border-width: 10px;
        }
    </style>
</head>
<body>
    

    <h1>Exemplos de caixas Box-level</h1>
    <p>Parágrafos tambem são exemplos de Box-level, mas os <a href="#"> Links são exemplos de caixas inline-level</a> vamos ver como tudo isso funciona</p>
    <div>
        margin-bottom
    </div>
    
    
</body>
</html>
