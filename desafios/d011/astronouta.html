<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D011 Astronauta</title>
    <style>

body {
    margin: 0;
}

.container {
    position: relative; /* base para sobreposição */
    width: 100%;
    height: 100vh;
}

.fundo {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.astronauta {
    position: absolute; /* ESSA É A CHAVE  */
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%); /* centraliza certinho */
    width: 300px; /* ajusta o tamanho */
}
.astronauta {
    filter: drop-shadow(0 0 20px rgba(255,255,255,0.3));
}

    </style>
</head>
<body>
    

    <div class="container">
        <img src="imagem/espaco.jpg" class="fundo" alt="Imagem espaço">
        <img src="imagem/astronauta.png" class="astronauta" alt="Imagem do astronauta">
    </div>

</body>
</html>
